# Set true color
set-option -sa terminal-overrides ",xterm*:Tc"

# Extend display pane timeout to 5 seconds
bind q display-panes -d 5000

# Enable mouse
# set -g mouse on

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

#Set Prefix
unbind C-b
set -g prefix C-space
bind C-space send-prefix

# Enable vim-style pane navigation with Ctrl + h/j/k/l
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# List of plugins

# Use short window names
set -g @catppuccin_window_default_text "#I"
set -g @catppuccin_window_current_text "#[bold]#I:#W"

# Fill style: "all" makes entire segment colored
set -g @catppuccin_window_current_fill "all"

# Optional: Add a separator for clarity between windows
set -g window-status-separator " "

# Optional: dim inactive windows
set -g window-status-style "fg=#6c7086,bg=default"

# Make current window text dark and bold
set -g @catppuccin_window_current_text "#[fg=#1e1e2e,bold]#I:#W"

# Use a pastel background (like lavender or mauve) or darker shade
set -g @catppuccin_window_current_fill "all"
set -g @catppuccin_window_current_bg "#cba6f7"  # Lavender or try #f5c2e7 for pink

# Optional: dim inactive windows further for focus
set -g @catppuccin_window_default_text "#[fg=#6c7086]#I:#W"

############# VI CONFIGURATIONS ############# 
# Use vi keys in copy mode
set -g mode-keys vi
# Start copy mode with vi style scrollback
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux#v2.1.3' # See https://github.com/catppuccin/tmux/tags for additional tags
set -g @plugin 'tmux-plugins/tmux-open'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Keep the current working directory when splitting
# Vertical split (top/bottom) with same working directory
bind-key '"' split-window -v -c "#{pane_current_path}"
# Horizontal split (left/right) with same working directory
bind-key % split-window -h -c "#{pane_current_path}"


# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
set-environment -g PATH "/usr/local/bin:/usr/bin:/bin:/opt/homebrew/bin:$PATH"
run '~/.tmux/plugins/tpm/tpm'

